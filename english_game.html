<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>🌸 Prefix & Suffix Adventure 🌸</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:linear-gradient(#d9c8ff,#f8e8ff);
    text-align:center;
}

.container{
    width:500px;
    margin:40px auto;
    background:white;
    border-radius:20px;
    padding:25px;
    box-shadow:0 0 15px rgba(0,0,0,.2);
}

h1{
    color:#8a4fff;
}

#mission{
    color:#ff69b4;
    font-weight:bold;
}

button{
    width:180px;
    padding:12px;
    margin:8px;
    border:none;
    border-radius:15px;
    background:#b48cff;
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    transform:scale(1.05);
    background:#9b6cff;
}

#score{
    font-size:22px;
    color:#6a32c9;
}

.progress{
    width:100%;
    background:#eee;
    border-radius:20px;
    overflow:hidden;
    margin:20px 0;
}

.bar{
    width:0%;
    height:20px;
    background:#8a4fff;
}

#message{
    font-size:20px;
    margin-top:15px;
}

#emoji{
    font-size:45px;
}
</style>
</head>

<body>

<div class="container">

<h1>🌸 Prefix & Suffix Adventure 🌸</h1>

<p id="mission">Mission 1 / 5</p>

<h2 id="question"></h2>

<div id="choices"></div>

<div class="progress">
<div class="bar" id="bar"></div>
</div>

<p id="score">⭐ Score : 0</p>

<div id="emoji">🐰</div>

<p id="message"></p>

</div>

<script>

const quiz=[
{
question:"Choose the correct Prefix for 'happy'",
choices:["un","re","pre","dis"],
answer:"un"
},
{
question:"Choose the correct Suffix for 'teach'",
choices:["er","ful","less","ing"],
answer:"er"
},
{
question:"What does 're-' mean?",
choices:["again","not","before","full"],
answer:"again"
},
{
question:"Choose the correct Prefix for 'possible'",
choices:["im","un","mis","pre"],
answer:"im"
},
{
question:"Choose the correct Suffix for 'care'",
choices:["ful","ness","ing","ly"],
answer:"ful"
}
];

let current=0;
let score=0;

function loadQuestion(){

document.getElementById("mission").innerHTML=
"Mission "+(current+1)+" / "+quiz.length;

document.getElementById("question").innerHTML=
quiz[current].question;

document.getElementById("choices").innerHTML="";

quiz[current].choices.forEach(choice=>{

let btn=document.createElement("button");

btn.innerHTML=choice;

btn.onclick=function(){
check(choice);
}

document.getElementById("choices").appendChild(btn);

});

document.getElementById("bar").style.width=
(current/quiz.length*100)+"%";

}

function check(choice){

if(choice==quiz[current].answer){

score+=10;

document.getElementById("emoji").innerHTML="✨🐰✨";

document.getElementById("message").innerHTML="Correct! 🎉";

}else{

document.getElementById("emoji").innerHTML="😢";

document.getElementById("message").innerHTML="Try Again!";

}

document.getElementById("score").innerHTML=
"⭐ Score : "+score;

setTimeout(nextQuestion,700);

}

function nextQuestion(){

current++;

if(current<quiz.length){

document.getElementById("emoji").innerHTML="🐰";

document.getElementById("message").innerHTML="";
loadQuestion();

}else{

finish();

}

}

function finish(){

document.getElementById("bar").style.width="100%";

let text="";

if(score==50){

text="🏆 PERFECT! Prefix & Suffix Master!";

}else if(score>=30){

text="🌸 Great Job!";

}else{

text="😊 Keep Practicing!";

}

document.querySelector(".container").innerHTML=
`
<h1>🎉 Mission Complete 🎉</h1>

<h2>${text}</h2>

<h2>Your Score : ${score}/50</h2>

<p>Thanks for helping the bunny! 🐰💜</p>

<button onclick="location.reload()">Play Again</button>

`;

}

loadQuestion();

</script>

</body>
</html>
